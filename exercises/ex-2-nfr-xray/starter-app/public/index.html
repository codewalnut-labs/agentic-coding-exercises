<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invoice Review</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        color: #777;
      }

      .panel {
        border: 1px solid #ddd;
        padding: 24px;
        max-width: 720px;
      }

      input,
      button {
        display: block;
        margin: 12px 0;
      }

      button {
        background: #ddd;
        border: 0;
        padding: 8px 16px;
      }

      .approve {
        color: #8bc34a;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Invoice Upload</h1>
      <form action="/api/invoices" method="post" enctype="multipart/form-data">
        <input name="tenantId" placeholder="Tenant">
        <input name="email" placeholder="Uploader email">
        <input name="vendorName" placeholder="Vendor">
        <input type="file" name="invoice">
        <button>upload</button>
      </form>
      <div class="approve" onclick="alert('approve from the queue')">approve selected</div>
    </main>
  </body>
</html>
