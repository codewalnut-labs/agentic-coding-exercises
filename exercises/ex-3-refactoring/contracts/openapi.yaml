openapi: 3.0.3
info:
  title: Quote Service
  version: 0.1.0
paths:
  /health:
    get:
      responses:
        "200":
          description: Service health
  /quotes:
    post:
      summary: Build a quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
      responses:
        "200":
          description: Quote response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "400":
          description: Invalid request
components:
  schemas:
    QuoteRequest:
      type: object
      required: [customerId, customerTier, region, items, requestedAt]
      properties:
        customerId:
          type: string
        customerTier:
          type: string
          enum: [starter, growth, enterprise]
        region:
          type: string
          enum: [US, EU, IN]
        promoCode:
          type: string
          enum: [SAVE10, SERVICES15, SHIPFREE]
        requestedAt:
          type: string
          format: date-time
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/QuoteItem"
    QuoteItem:
      type: object
      required: [sku, quantity, unitPriceCents, category]
      properties:
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitPriceCents:
          type: integer
          minimum: 0
        category:
          type: string
          enum: [software, services, hardware]
    QuoteResponse:
      type: object
      required:
        - quoteId
        - currency
        - subtotalCents
        - tierDiscountCents
        - promoDiscountCents
        - taxCents
        - shippingCents
        - totalCents
        - expiresAt
      properties:
        quoteId:
          type: string
        currency:
          type: string
        subtotalCents:
          type: integer
        tierDiscountCents:
          type: integer
        promoDiscountCents:
          type: integer
        taxCents:
          type: integer
        shippingCents:
          type: integer
        totalCents:
          type: integer
        expiresAt:
          type: string
          format: date-time

